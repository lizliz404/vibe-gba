<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>vibe-gba — Route 101</title>
  <meta name="description" content="vibe-gba: a self-contained browser adventure. No ROM, no upload — press Start and play." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="game-body">
  <div id="game-root">
    <canvas id="game-screen" width="480" height="360" aria-label="vibe-gba game screen"></canvas>
    <div id="game-ui">
      <div id="title-bar">vibe-gba <span class="sub">Route 101</span></div>
      <div id="start-overlay" class="overlay">
        <button id="start-btn" class="start-button" type="button">▶ START</button>
        <p class="start-hint">Arrows/WASD = move &nbsp; Z = interact &nbsp; X = back</p>
      </div>
      <div id="dialogue-box" class="hidden">
        <p id="dialogue-name"></p>
        <p id="dialogue-text"></p>
        <p class="dialogue-hint">Press Z to continue</p>
      </div>
      <div id="battle-box" class="hidden">
        <p id="battle-text"></p>
        <div id="battle-actions">
          <button data-action="fight" class="battle-btn">FIGHT</button>
          <button data-action="bag" class="battle-btn">BAG</button>
          <button data-action="run" class="battle-btn">RUN</button>
        </div>
      </div>
      <div id="hud">
        <span id="hud-zone"></span>
        <span id="hud-hp">HP <b id="hp-val">20/20</b></span>
        <span id="hud-potions">🧪 <b id="potions-val">3</b></span>
      </div>
    </div>
  </div>
  <script src="/play/play.js"></script>
</body>
</html>
